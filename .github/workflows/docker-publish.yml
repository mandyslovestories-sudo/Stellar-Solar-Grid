name: Docker Publish
on:
  push:
    branches: [main]
    tags: [v*]
env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/solargrid-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/solargrid-frontend
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_CONTRACT_ID=${{ secrets.VITE_CONTRACT_ID }}
            VITE_RPC_URL=${{ secrets.VITE_RPC_URL }}
