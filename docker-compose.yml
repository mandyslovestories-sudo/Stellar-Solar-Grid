version: "3.8"

services:
  env-check:
    image: alpine
    environment:
      - CONTRACT_ID=${CONTRACT_ID}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - VITE_CONTRACT_ID=${VITE_CONTRACT_ID}
    command: >
      sh -c '
      failed=0;
      for var in CONTRACT_ID ADMIN_SECRET_KEY VITE_CONTRACT_ID; do
        eval val=\$$var
        if [ -z "$val" ] || [ "$val" = "YOUR_CONTRACT_ID_HERE" ] || [ "$val" = "YOUR_ADMIN_SECRET_KEY_HERE" ]; then
          echo "ERROR: Required environment variable $$var is not set, is empty, or has placeholder value."
          failed=1
        fi
      done;
      if [ "$failed" -ne 0 ]; then
        exit 1
      fi;
      echo "All required environment variables are set."
      '

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - app-network
    healthcheck:
      test: [CMD, mosquitto_sub, -t, $$SYS/#, -C, 1, -i, hc, -W, 3]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - MQTT_BROKER=mqtt://mqtt:1883
      - STELLAR_NETWORK=testnet
      - CONTRACT_ID=${CONTRACT_ID}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
    env_file:
      - ./backend/.env
    depends_on:
      mqtt:
        condition: service_healthy
      env-check:
        condition: service_completed_successfully
    networks:
      - app-network
    healthcheck:
      test: [CMD, wget, -qO-, http://localhost:3001/health]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - observability
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    profiles:
      - observability
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_CONTRACT_ID=${VITE_CONTRACT_ID}
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
        - VITE_RPC_URL=${VITE_RPC_URL}
        - VITE_NETWORK_PASSPHRASE=${VITE_NETWORK_PASSPHRASE}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
